name: Dev Notes on PR Comment

# Drop this file into .github/workflows/ of any repo to enable /notes commands.
# Required secrets (set at repo or org level):
#   JIRA_TOKEN, JIRA_BASE_URL, ANTHROPIC_API_KEY, GH_PAT

on:
  issue_comment:
    types: [created]

jobs:
  trigger-notes:
    # Only run on PR comments (not issue comments) matching /notes TICKET-ID
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/notes ')
    runs-on: ubuntu-latest
    steps:
      - name: Extract ticket ID
        id: extract
        run: |
          COMMENT="${{ github.event.comment.body }}"
          TICKET=$(echo "$COMMENT" | grep -oP '/notes\s+\K[A-Z]+-\d+')
          if [ -z "$TICKET" ]; then
            echo "No valid ticket ID found in comment."
            exit 1
          fi
          echo "ticket_id=$TICKET" >> $GITHUB_OUTPUT

      - name: Trigger dev notes generation
        uses: nikoswal/ai-auto-notes-generator/.github/workflows/generate-notes.yml@main
        with:
          ticket_id: ${{ steps.extract.outputs.ticket_id }}
          pr_number: ${{ github.event.issue.number }}
          repo_full_name: ${{ github.repository }}
        secrets:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}