name: Generate Dev Notes (Reusable)

on:
  workflow_call:
    inputs:
      ticket_id:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      repo_full_name:
        required: true
        type: string
      github_org:
        required: false
        type: string
        default: ""
    secrets:
      JIRA_TOKEN:
        required: true
      JIRA_BASE_URL:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ai-auto-notes-generator
        uses: actions/checkout@v4
        with:
          repository: nikoswal/ai-auto-notes-generator
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Dev Notes
        id: generate
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_API_VERSION: "2"
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_ORG: ${{ inputs.github_org }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NOTES=$(python main.py ${{ inputs.ticket_id }} --quiet)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Dev Notes as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const [owner, repo] = "${{ inputs.repo_full_name }}".split("/");
            const notes = `${{ steps.generate.outputs.NOTES }}`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: ${{ inputs.pr_number }},
              body: `## 📋 Auto-Generated Dev Notes\n\n${notes}\n\n---\n*Generated by [ai-auto-notes-generator](https://github.com/8x8/ai-auto-notes-generator). Review and edit before posting to Jira.*`
            });